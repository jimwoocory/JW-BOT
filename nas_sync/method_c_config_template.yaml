# ============================================================
# Method C 配置模板
# ============================================================
# 将以下内容添加到 config.yaml 文件末尾
# 注意：保持 YAML 缩进，这是第一级配置（与 nas, watch, astrbot 同级）
# ============================================================

feishu:
  # ============================================================
  # 群组配置
  # ============================================================
  # 监听的群组 chat_id
  # 获取方式：
  #   1. 打开群组 → URL 中查看，例如:
  #      https://xxx.feishu.cn/im/chat/oc_xxx123456789
  #      取 oc_xxx123456789 部分
  #   2. 或在群组信息中查看群号
  #   3. API 返回的 chat_id 字段
  #
  # 示例: "oc_xxx123456789"
  group_chat_id: "oc_"

  # ============================================================
  # 部门映射（用户 ID → 部门名）
  # ============================================================
  # 格式: "用户_ID": "部门名称"
  #
  # 获取用户 ID 的方法：
  #   1. Feishu 后台查看员工信息
  #   2. 从 Feishu API 返回的消息中查看 sender.id
  #   3. 员工账号的"用户 ID"字段（通常以 ou_ 开头）
  #
  # 没有匹配的用户 ID 时，自动分类到 "其他"
  #
  # 示例配置：
  department_mapping:
    # 中台运营项目
    # "ou_user_001": "中台运营项目"
    # "ou_user_002": "中台运营项目"

    # 品宣运营项目
    # "ou_user_003": "品宣运营项目"
    # "ou_user_004": "品宣运营项目"

    # 品牌规范
    # "ou_user_005": "品牌规范"

    # 营销素材
    # "ou_user_006": "营销素材"

    # 其他
    # "ou_user_999": "其他"


# ============================================================
# 高级选项（可选）
# ============================================================
# 若要自定义文件导出格式，编辑 feishu_sync_method_c.py 中的 FILE_TYPE_MAP

# FILE_TYPE_MAP = {
#     'file': 'file',        # 普通文件直接下载（默认）
#     'docx': 'markdown',    # Word 文档导出为 Markdown（默认）
#     'sheet': 'csv',        # 表格导出为 CSV（默认）
#     'bitable': 'csv',      # 多维表格导出为 CSV（默认）
# }
#
# 可选的导出格式：
#   - 文档：markdown, pdf, docx, txt
#   - 表格：csv, xlsx
#   - 其他：根据 Feishu API 支持

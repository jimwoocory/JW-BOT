# Router Benchmark v0 — Phase R0.5
#
# 50 条 ground-truth 样本，覆盖 4 workflow + 10+ skill + 通用聊天 + OOS。
# 每条样本：
#   id:       唯一标识，便于回归对比
#   message:  发送给 router 的原始消息文本
#   expect:   期望的 Intent 字段子集（category 必填，其余可选）
#   notes:    可选说明，仅供阅读
#
# 评测时 LLM fallback 默认关闭——本基准衡量"纯规则层"准确率，
# 给后续 R2 嵌入分类器和 R3 LLM-judge 一条清晰的基线。


# 自动同步配置文件
# 路径: ~/DC-Agent/config/auto_sync.conf

# ============================================================
# 同步设置
# ============================================================

# 是否同步后卸载 NAS（true=卸载，false=保持挂载）
UNMOUNT_AFTER_SYNC=true

# 是否记录详细日志（true=详细，false=简洁）
VERBOSE_LOGGING=true

# 保留日志天数
LOG_RETENTION_DAYS=30

# 同步前是否先备份（true=备份，false=覆盖）
BACKUP_BEFORE_SYNC=false

# ============================================================
# 百度网盘设置
# ============================================================

# 百度网盘同步根目录
Baidu_ROOT="柳汽"

# 要同步的文件夹列表（用空格分隔）
SYNC_FOLDERS=(
    "封面模板&尾版"
    "柳汽Q1季度素材成片汇总"
    "柳汽后市场新媒体运营视频"
)

# ============================================================
# NAS 设置
# ============================================================

# NAS 挂载点
NAS_MOUNT="/Users/dianchi/nas_kb"

# 同步目标目录
SYNC_TARGET="$NAS_MOUNT/百度网盘同步"

# ============================================================
# 高级设置
# ============================================================

# 网络检测（测试网络连通性）
NETWORK_CHECK=true

# 重试次数
MAX_RETRIES=3

# 重试间隔（秒）
RETRY_INTERVAL=60

# 同步超时（秒）
SYNC_TIMEOUT=7200
